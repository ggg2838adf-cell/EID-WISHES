<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Syed Bineesa Andrabi</title>
    <!-- Importing beautiful fonts for Arabic and English -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Base Styling & Night Sky Background */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #040914, #0b1a30, #142b47);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Twinkling Stars generated by JS */
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            animation: twinkle infinite ease-in-out;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 6px #fff; }
        }

        /* Swinging Lanterns */
        .lantern {
            position: absolute;
            top: 0;
            width: 50px;
            height: 100px;
            /* Using a high-quality open-source lantern silhouette */
            background: url('https://cdn-icons-png.flaticon.com/512/10777/10777943.png') no-repeat center;
            background-size: contain;
            transform-origin: top center;
            animation: swing 3.5s infinite ease-in-out alternate;
            z-index: 5;
            /* CSS filter to make the black icon match our gold theme */
            filter: invert(81%) sepia(31%) saturate(718%) hue-rotate(345deg) brightness(102%) contrast(95%);
        }
        .lantern.left { left: 15%; animation-delay: 0s; }
        .lantern.right { right: 15%; animation-delay: 1.5s; width: 40px; height: 80px; }

        @keyframes swing {
            0% { transform: rotate(12deg); }
            100% { transform: rotate(-12deg); }
        }

        /* Floating Glowing Moon */
        .moon {
            width: 80px;
            height: 80px;
            background: transparent;
            border-radius: 50%;
            /* Creating a crescent using box-shadow */
            box-shadow: 20px 20px 0 0 #f3c623;
            margin-bottom: 40px;
            z-index: 10;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(243, 198, 35, 0.6));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Glassmorphism Greeting Card */
        .greeting-container {
            text-align: center;
            z-index: 10;
            background: rgba(11, 26, 48, 0.4);
            padding: 50px;
            border-radius: 25px;
            border: 1px solid rgba(243, 198, 35, 0.3);
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 40px rgba(243, 198, 35, 0.1);
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Text Styling */
        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 5rem;
            margin: 0 0 15px 0;
            color: #f3c623;
            text-shadow: 0 0 25px rgba(243, 198, 35, 0.6);
            line-height: 1;
        }

        .english-text {
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 3px;
            color: #e0e6ed;
            text-transform: uppercase;
        }

        .name {
            font-size: 2.8rem;
            font-weight: 600;
            margin-top: 15px;
            background: linear-gradient(45deg, #f3c623, #ffeba1, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(243, 198, 35, 0.2)); }
            to { filter: drop-shadow(0 0 15px rgba(243, 198, 35, 0.7)); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .arabic-text { font-size: 3.5rem; }
            .name { font-size: 1.8rem; }
            .english-text { font-size: 0.9rem; }
            .greeting-container { padding: 30px 20px; width: 85%; }
            .lantern { display: none; /* Hide lanterns on small screens to save space */ }
            .moon { width: 60px; height: 60px; box-shadow: 15px 15px 0 0 #f3c623; }
        }
    </style>
</head>
<body>
    
    <!-- Decorative Elements -->
    <div class="lantern left"></div>
    <div class="lantern right"></div>
    <div class="moon"></div>
    
    <!-- Main Content -->
    <div class="greeting-container">
        <div class="arabic-text">عِيد مُبَارَك</div>
        <div class="english-text">Wishing a joyous & blessed Eid to</div>
        <div class="name">SYED BINEESA ANDRABI</div>
    </div>

    <!-- JavaScript to generate the starry night -->
    <script>
        function createStars() {
            const count = 150; // Number of stars
            const body = document.querySelector('body');
            
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Randomize star size, placement, and twinkle speed
                const size = Math.random() * 3 + 1;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 2 + 1;
                const delay = Math.random() * 2;
                
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = x + 'vw';
                star.style.top = y + 'vh';
                star.style.animationDuration = duration + 's';
                star.style.animationDelay = delay + 's';
                
                body.appendChild(star);
            }
        }
        
        // Initialize stars on page load
        window.onload = createStars;
    </script>
</body>
</html>
